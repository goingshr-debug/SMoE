name: SMoE
channels:
  - conda-forge
  - https://repo.anaconda.com/pkgs/main
  - https://repo.anaconda.com/pkgs/r
  - pytorch
  - nvidia
dependencies:
  # ── Python (free-threading build, cp313t) ──────────────────────────────
  - python=3.13.2          # cp313t free-threading build
  - pip>=25.0

  # ── System / build ─────────────────────────────────────────────────────
  - gcc_impl_linux-64=14.2.0
  - rust=1.87.0
  - openssl=3.5.0
  - bzip2=1.0.8
  - libffi=3.4.6
  - libzlib=1.3.1
  - ncurses=6.5
  - readline=8.2

  # ── pip-installed packages ─────────────────────────────────────────────
  - pip:
    # Core deep learning
    - torch==2.7.1                    # PyTorch (install CUDA variant separately if needed)
    # e.g. for CUDA 12.1: pip install torch==2.7.1 --index-url https://download.pytorch.org/whl/cu121

    # HuggingFace ecosystem
    - transformers==4.50.3
    - tokenizers==0.21.1              # stable release matching transformers 4.50
    - huggingface-hub==0.32.4
    - safetensors==0.5.3
    - accelerate>=0.34.0              # optional but recommended for model loading

    # Scientific computing
    - numpy==2.3.0
    - scipy==1.15.3

    # Utilities
    - psutil==7.0.0
    - tqdm==4.67.1

    # Optional: Flash Attention 2 (requires CUDA, compile from source if needed)
    # - flash-attn>=2.5.0             # uncomment if GPU supports FA2
